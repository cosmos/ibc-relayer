name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}
  IMAGE_NAME: ibc-relayer

jobs:
  build-and-push:
    runs-on: depot-ubuntu-24.04-4
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - image: ibc-relayer
            file: Dockerfile.relayer
          - image: ibc-relayer-migrate
            file: docker/migrate.dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tag
        id: tags
        run: |
          DOCKER_TAG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9\.-]/-/g')
          echo "DOCKER_TAG=${DOCKER_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ steps.tags.outputs.DOCKER_TAG }}
