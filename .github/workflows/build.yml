name: Build images
on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
  workflow_dispatch:
jobs:
  gather_env:
    runs-on: depot-ubuntu-22.04
    outputs:
      env: ${{ env.environment }}
    steps:
      - name: Set the environment to dev if running a workflow_dispatch
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
        run: |
          echo "environment=dev" >> "$GITHUB_ENV"
      - name: Set the environment to dev if running on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "environment=dev" >> "$GITHUB_ENV"
      - name: Set the environment to prod if running on a tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "environment=prod" >> "$GITHUB_ENV"
  build:
    needs: [gather_env]
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        builds:
          [
            { image: "relayer", file: "Dockerfile.relayer" },
            { image: "relayer-migrate", file: "docker/migrate.dockerfile" },
          ]
    uses: skip-mev/gitops-actions/.github/workflows/build-base.yml@main
    secrets: inherit
    with:
      image_name: cosmos/ibc-${{ matrix.builds.image }}
      matrix_key: ${{ matrix.builds.image }}
      docker_file_path: "./${{ matrix.builds.file }}"

  read:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: cloudposse/github-action-matrix-outputs-read@v1
        id: read
        with:
          matrix-step-name: build

    outputs:
      result: ${{ steps.read.outputs.result }}

  check:
    runs-on: ubuntu-latest
    needs: [read]
    steps:
      - name: Check the result
        run: |
          echo "========================="
          echo "Raw JSON result:"
          echo '${{ needs.read.outputs.result }}' | jq .
          echo "========================="
